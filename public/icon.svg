<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e"/>
      <stop offset="100%" style="stop-color:#0d0f1a"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ecf8e"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer hexagon -->
  <polygon
    points="256,48 432,152 432,360 256,464 80,360 80,152"
    fill="none"
    stroke="url(#hex)"
    stroke-width="18"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon -->
  <polygon
    points="256,128 368,192 368,320 256,384 144,320 144,192"
    fill="none"
    stroke="url(#inner)"
    stroke-width="10"
    stroke-linejoin="round"
    opacity="0.6"
  />

  <!-- Center dot -->
  <circle cx="256" cy="256" r="28" fill="url(#hex)"/>

  <!-- Connecting lines -->
  <line x1="256" y1="228" x2="256" y2="128" stroke="url(#hex)" stroke-width="6" opacity="0.4"/>
  <line x1="256" y1="284" x2="256" y2="384" stroke="url(#hex)" stroke-width="6" opacity="0.4"/>
  <line x1="228" y1="241" x2="144" y2="192" stroke="url(#hex)" stroke-width="6" opacity="0.4"/>
  <line x1="284" y1="271" x2="368" y2="320" stroke="url(#hex)" stroke-width="6" opacity="0.4"/>
  <line x1="284" y1="241" x2="368" y2="192" stroke="url(#hex)" stroke-width="6" opacity="0.4"/>
  <line x1="228" y1="271" x2="144" y2="320" stroke="url(#hex)" stroke-width="6" opacity="0.4"/>
</svg>